name: Release

on:
  push:
    tags:
      - 'v*' # Triggers on v1.0, v2.1.3, etc.

jobs:
  release:
    runs-on: ubuntu-latest
    # Ensure this only runs if tests passed (optional, but recommended)
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Library
        run: npm run build

      - name: Pack Library
        # This creates a .tgz file of your library, standard for NPM/Angular dists
        run: |
          cd dist/axon # Adjust this path to your actual build output folder
          npm pack
          mv *.tgz ../../axon.tgz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: axon.tgz
          generate_release_notes: true
          # This ensures the release isn't a draft and is marked as the latest
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to NPM
        run: |
          cd dist/axon # Ensure this is the folder containing the package.json to be published
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > .npmrc
          npm publish --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}